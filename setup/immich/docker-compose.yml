name: immich

services:
  immich-server:
    image: ghcr.io/immich-app/immich-server:v2.6.3
    restart: unless-stopped
    depends_on:
      - redis
      - postgres
    environment:
      DB_HOSTNAME: postgres
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE_NAME: ${DB_DATABASE_NAME}
      REDIS_HOSTNAME: redis
      UPLOAD_LOCATION: ${UPLOAD_LOCATION}
      MACHINE_LEARNING_URL: http://immich-machine-learning:3003
    volumes:
      - /Volumes/HomeRAID/immich/upload:${UPLOAD_LOCATION}
      - /Volumes/HomeRAID/icloud-export:/usr/src/app/icloud-export:ro

  immich-microservices:
    image: ghcr.io/immich-app/immich-server:v2.6.3
    restart: unless-stopped
    command: ["start.sh", "microservices"]
    depends_on:
      - redis
      - postgres
    environment:
      DB_HOSTNAME: postgres
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE_NAME: ${DB_DATABASE_NAME}
      REDIS_HOSTNAME: redis
      UPLOAD_LOCATION: ${UPLOAD_LOCATION}
      MACHINE_LEARNING_URL: http://immich-machine-learning:3003
    volumes:
      - /Volumes/HomeRAID/immich/upload:${UPLOAD_LOCATION}
      - /Volumes/HomeRAID/icloud-export:/usr/src/app/icloud-export:ro

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:v2.6.3
    restart: unless-stopped
    volumes:
      - /Volumes/HomeRAID/immich/model-cache:/cache

  redis:
    image: redis:6.2-alpine
    restart: unless-stopped

  postgres:
    image: tensorchord/pgvecto-rs:pg14-v0.2.0
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE_NAME}
    volumes:
      - /Volumes/HomeRAID/immich/postgres:/var/lib/postgresql/data
